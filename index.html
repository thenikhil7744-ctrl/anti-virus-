<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>System Security Scan</title>

    <style>
        body {
            margin: 0;
            background: black;
            color: #00ff00;
            font-family: monospace;
            overflow: hidden;
        }

        #main {
            padding: 20px;
        }

        h1 {
            color: red;
            text-align: center;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        #progress {
            width: 100%;
            height: 20px;
            background: #111;
            margin-top: 20px;
        }

        #bar {
            height: 100%;
            width: 0%;
            background: red;
        }

        #logs {
            height: 200px;
            overflow: auto;
            border: 1px solid #0f0;
            padding: 10px;
            margin-top: 20px;
            font-size: 14px;
        }

        .warning {
            color: red;
            font-size: 20px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body onclick="goFullScreen()">

    <div id="main">
        <h1>⚠ SYSTEM UNDER ATTACK ⚠</h1>

        <p id="status">Initializing security scan...</p>

        <div id="progress">
            <div id="bar"></div>
        </div>

        <div id="logs"></div>

        <div class="warning" id="warning"></div>
    </div>

    <script>
        let progress = 0;
        let bar = document.getElementById("bar");
        let status = document.getElementById("status");
        let logs = document.getElementById("logs");
        let warning = document.getElementById("warning");

        function addLog(text) {
            logs.innerHTML += text + "<br>";
            logs.scrollTop = logs.scrollHeight;
        }

        // 🔊 Beep sound
        function beep() {
            let ctx = new AudioContext();
            let osc = ctx.createOscillator();
            osc.type = "square";
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.connect(ctx.destination);
            osc.start();
            setTimeout(() => osc.stop(), 100);
        }

        // Fullscreen
        function goFullScreen() {
            document.documentElement.requestFullscreen();
        }

        // Fake scan
        let scan = setInterval(() => {
            progress += Math.random() * 8;
            bar.style.width = progress + "%";

            if (progress > 20) {
                status.innerText = "Scanning system files...";
                addLog("✔ system32.dll checked");
            }

            if (progress > 40) {
                status.innerText = "Checking network...";
                addLog("✔ IP connection traced");
            }

            if (progress > 60) {
                status.innerText = "Unauthorized access detected!";
                addLog("❌ Hacker attempting access...");
                beep();
            }

            if (progress > 80) {
                status.innerText = "Virus detected!";
                addLog("🦠 Trojan.exe found");
                addLog("🦠 Malware.bat injected");
                beep();
            }

            if (progress >= 100) {
                clearInterval(scan);
                status.innerText = "SYSTEM COMPROMISED!";
                warning.innerHTML = "💀 YOUR DATA IS BEING STOLEN 💀<br>DO NOT TURN OFF PC!";

                setInterval(() => {
                    warning.style.visibility = (warning.style.visibility == "hidden") ? "visible" : "hidden";
                }, 500);

                beep();
            }

        }, 500);

        // ESC exit hint
        document.addEventListener("keydown", function (e) {
            if (e.key === "Escape") {
                alert("System Exit Allowed ✅");
            }
        });
    </script>

</body>

</html>
